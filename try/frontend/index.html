<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeGuard Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>EdgeGuard – Real‑time Health & Safety Dashboard</h1>
    <button id="sosBtn" class="sos-button">🚨 SOS</button>
  </header>
  <main class="grid-container">
    <section class="card glass"><h2>Heart Rate (BPM)</h2><canvas id="hrChart"></canvas></section>
    <section class="card glass"><h2>SpO₂ (%)</h2><canvas id="spo2Chart"></canvas></section>
    <section class="card glass"><h2>Temperature (°C)</h2><canvas id="tempChart"></canvas></section>
    <section class="card glass"><h2>Air Quality (AQI)</h2><canvas id="aqiChart"></canvas></section>
    <section id="alertArea" class="alert-area"></section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
